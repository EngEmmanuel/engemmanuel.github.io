name: Update Publications

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements-publications.txt

      - name: Fetch publications from Google Scholar
        run: |
          python scripts/update_publications.py \
            --user X8GzMrEAAAAJ \
            --hl en \
            --output publications.json

      - name: Commit and push if changed
        run: |
          if git diff --quiet publications.json; then
            echo "No changes to publications.json"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add publications.json
          git commit -m "chore: update publications from Google Scholar"
          git push
